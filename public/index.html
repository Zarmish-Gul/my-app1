<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan Shop | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        .font-serif { font-family: 'Playfair+Display', serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">

    <nav class="flex justify-between items-center px-10 py-6 border-b border-stone-200 bg-white sticky top-0 z-50">
        <h1 class="text-2xl font-serif tracking-widest uppercase">Artisan</h1>
        <div class="space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold">
            <a href="/" class="hover:text-stone-500 transition-colors">Home</a>
            <a href="/store.html" class="hover:text-stone-500 transition-colors">Shop</a>
            <a href="/admin.html" class="hover:text-stone-500 transition-colors border-l pl-8 border-stone-200">Admin</a>
        </div>
    </nav>

    <main class="min-h-screen">
        <section class="h-[60vh] flex flex-col items-center justify-center text-center px-6">
            <h2 class="text-6xl font-serif mb-6">Handmade with Heart</h2>
            <p class="max-w-md text-stone-500 mb-10 leading-relaxed">Experience the CRUD logic: Place an order below and see it appear in the Admin Inbox.</p>
        </section>

        <section class="max-w-xl mx-auto p-12 bg-white shadow-xl rounded-lg mb-20 border border-stone-100">
            <h3 class="font-serif text-3xl mb-8 text-center">Quick Order Test</h3>
            
            <form id="orderForm" class="space-y-4">
                <div>
                    <label class="text-[9px] uppercase tracking-widest text-stone-400 font-bold">Your Name</label>
                    <input type="text" id="customerName" required class="w-full p-4 bg-stone-50 border border-stone-100 outline-none focus:border-stone-900 transition-all">
                </div>
                <div>
                    <label class="text-[9px] uppercase tracking-widest text-stone-400 font-bold">Choose Item</label>
                    <select id="items" class="w-full p-4 bg-stone-50 border border-stone-100 outline-none focus:border-stone-900 transition-all">
                        <option value="Caramel Macchiato - $4.95">Caramel Macchiato - $4.95</option>
                        <option value="Butter Croissant - $3.50">Butter Croissant - $3.50</option>
                        <option value="Artisan Loaf - $6.00">Artisan Loaf - $6.00</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-stone-900 text-white py-4 font-bold uppercase text-[10px] tracking-widest hover:bg-black transition-all">
                    Place Order (POST to DB)
                </button>
            </form>
            <p id="responseMessage" class="mt-4 text-center text-xs uppercase tracking-widest text-green-600 hidden">Order sent to server!</p>
        </section>
    </main>

    <script>
        const orderForm = document.getElementById('orderForm');
        const responseMsg = document.getElementById('responseMessage');

        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const orderData = {
                customerName: document.getElementById('customerName').value,
                items: document.getElementById('items').value,
                total: document.getElementById('items').value.split('$')[1] // Extracts the price
            };

            try {
                // This is the "CREATE" part of CRUD
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    responseMsg.classList.remove('hidden');
                    orderForm.reset();
                    setTimeout(() => responseMsg.classList.add('hidden'), 3000);
                }
            } catch (err) {
                alert("Error connecting to server!");
            }
        });
    </script>
</body>
</html>
