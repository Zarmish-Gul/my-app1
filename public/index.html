<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-6 bg-indigo-600">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i class="fas fa-tasks"></i> Task Manager
            </h1>
        </div>

        <div class="p-6 border-b border-gray-200">
            <form id="taskForm" class="flex flex-col md:flex-row gap-3">
                <input type="hidden" id="taskId">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Enter a new task..." 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    required
                >
                <button 
                    type="submit" 
                    id="submitBtn"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded-lg transition duration-200"
                >
                    Add Task
                </button>
            </form>
        </div>

        <div class="p-6">
            <ul id="taskList" class="space-y-3">
                </ul>
            
            <div id="emptyState" class="text-center py-10 text-gray-500">
                <i class="fas fa-clipboard-list text-4xl mb-3 block"></i>
                <p>No tasks yet. Start by adding one above!</p>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let isEditing = false;

        const taskForm = document.getElementById('taskForm');
        const taskInput = document.getElementById('taskInput');
        const taskIdInput = document.getElementById('taskId');
        const submitBtn = document.getElementById('submitBtn');
        const taskList = document.getElementById('taskList');
        const emptyState = document.getElementById('emptyState');

        // --- Core Functions ---

        function renderTasks() {
            taskList.innerHTML = '';
            
            if (tasks.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200 group hover:shadow-sm transition";
                li.innerHTML = `
                    <span class="text-gray-700 font-medium">${task.text}</span>
                    <div class="flex gap-2">
                        <button onclick="editTask(${task.id})" class="text-blue-500 hover:text-blue-700 p-2">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteTask(${task.id})" class="text-red-500 hover:text-red-700 p-2">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        // Create / Update
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            
            if (isEditing) {
                // Update
                const id = parseInt(taskIdInput.value);
                tasks = tasks.map(t => t.id === id ? { ...t, text } : t);
                isEditing = false;
                submitBtn.innerText = 'Add Task';
                submitBtn.classList.replace('bg-green-600', 'bg-indigo-600');
            } else {
                // Create
                const newTask = {
                    id: Date.now(),
                    text: text
                };
                tasks.push(newTask);
            }

            taskInput.value = '';
            taskIdInput.value = '';
            renderTasks();
        });

        // Edit (Prepare form)
        window.editTask = (id) => {
            const task = tasks.find(t => t.id === id);
            taskInput.value = task.text;
            taskIdInput.value = task.id;
            isEditing = true;
            submitBtn.innerText = 'Update Task';
            submitBtn.classList.replace('bg-indigo-600', 'bg-green-600');
            taskInput.focus();
        };

        // Delete
        window.deleteTask = (id) => {
            if(confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                renderTasks();
            }
        };

        // Initial Render
        renderTasks();
    </script>
</body>
</html>
